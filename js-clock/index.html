<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>clock</title>
    <script src="index.js"></script>
</head>

<body>
    <div class="clock">
        <div class="clock-face">
            <div class="hand hour-hand"></div>
            <div class="hand min-hand"></div>
            <div class="hand sec-hand"></div>
        </div>
    </div>
    <style>
        html {
            background: antiquewhite;
            text-align: center;
        }

        body {
            display: flex;
            min-height: 100vh;
            align-items: center;
        }

        .clock {
            width: 30rem;
            height: 30rem;
            border: 20px solid white;
            border-radius: 50%;
            margin: 50px auto;
            position: relative;
            padding: 2rem;
            box-shadow: 0 0 0px 4px rgba(0, 0, 0, 0.1),
                inset 0 0 0 3px #EFEFEF,
                inser 0 0 10px black,
                0 0 10px rgba(0, 0, 0, 0.2);
        }

        .clock {
  -webkit-app-region: drag;
}
.hand, .center, .bg-name, #twelve, #three, #six, #nine {
  -webkit-app-region: no-drag;
}
        .clock-face {
            position: relative;
            width: 100%;
            height: 100%;
            transform: translateY(-3px);
        }

        .sec-hand {
            transform: rotate(45deg);
        }

        .hand {
            width: 50%;
            height: 6px;
            background: black;
            position: absolute;
            top: 50%;
            transform-origin: 100%;
            transform: rotate(90deg);
            transition-timing-function: cubic-bezier(0.12, 2.26, 0.58, 1);

        }
    </style>
    <script>
      
    </script>
</body>

</html>
