<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>clock ui</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>

    <div class="widget-wrapper">


        <div class="clock">
            <div class="clock-face">
                <div id="twelve" class="text-4xl font-semibold">12</div>
                <div id="three" class="text-4xl font-semibold">3</div>
                <div id="six" class="text-4xl font-semibold">6</div>
                <div id="nine" class="text-4xl font-semibold">9</div>
                <div class="bg-name"><span class="text-7xl opacity-20">Never<span></span><br>
                        <span class="text-7xl">Settle</span></div>
                <div class="hand hour-hand"></div>
                <div class="hand min-hand"></div>
                <div class="hand second-hand"></div>
                <div class="center"></div>
            </div>
        </div>
    </div>


    <style>
        .clock {
  -webkit-app-region: drag;
}
        .hand, .center, .bg-name, #twelve, #three, #six, #nine {
  -webkit-app-region: no-drag;
}
        /* body styling */
     body{

  background: white;
}

     html, body {
  margin: 0;
  padding: 0;
  display: inline-block; /* important */
  overflow: hidden;
}

        .widget-wrapper {
            /* transform: scale(0.6); */
            /* 🔥 adjust: 0.5 - 0.7 ideal */
            zoom:0.55;
            transform-origin: center;
        }


        /* clock border */
   .clock{
  width:30rem;
  height:30rem;
  border:20px solid rgb(255, 0, 0);
  border-radius:20px;
  position:relative;
  padding:2rem;
  margin:0; /* remove auto margins */
  background:white;

   box-shadow: 
    0 10px 25px rgba(0,0,0,0.25),
    inset 0 0 15px rgba(0,0,0,0.05);
}

        /* inside clock face */
        .clock-face {
            background-color: white;
            border-radius: 20px;
            position: relative;
            width: 100%;
            height: 100%;
            /* transform:translateY(-3px); */
        }

        /* hand css */
        .hand {
            width: 40%;
            height: 6px;
            background: black;
            position: absolute;
            /* setting position to 50% from parent*/
            top: 50%;
            left: 10%;

            /* origin and setting to default position of time */
            transform-origin: 100%;
            transform: rotate(90deg);
            /* transition: all 0.05s; */
            transition-timing-function: cubic-bezier(0.29, 2.31, 0.36, 1.42);
            /* transition-timing-function: cubic-bezier(0.24, 2.72, 0.58, 1); */
            z-index: 2;

        }

        .center {
            border: black solid 4px;
            background-color: white;
            height: 1.5rem;
            width: 1.5rem;
            border-radius: 50%;
            position: absolute;
            top: 49%;
            left: 48%;
            z-index: 3;
        }

        .bg-name {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* background-color: aqua; */
            z-index: 1;
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            /* width:40%; */
            /* height: 40%; */
            left: 50%;
        }

        .bg-text {
            font-size: xx-large;

        }

        .second-hand {
            background-color: #F10000;
            width: 40%;
            /* height:10px; */
            border-radius: 10px;
        }

        .min-hand {
            height: 10px;
            border-radius: 10px;
            width: 35%;
            left: 15%;

            /* color for min hand */
            background: #0F2027;
            /* fallback for old browsers */
            background: -webkit-linear-gradient(to left, #2C5364, #203A43, #0F2027);
            /* Chrome 10-25, Safari 5.1-6 */
            background: linear-gradient(to left, #2C5364, #203A43, #0F2027);
            /* W3C, IE 10+/ Edge, Firefox 16+, Chrome 26+, Opera 12+, Safari 7+ */

        }

        .hour-hand {
            height: 15px;
            border-radius: 10px;
            width: 25%;
            position: absolute;
            /* setting position to 50% from parent*/
            top: 50%;
            left: 25%;
        }

        #twelve {
            position: absolute;
            left: 50%;
            top: 1%;
            transform: translateX(-50%);
        }

        #three {
            position: absolute;
            right: 1%;
            top: 50%;
            transform: translateY(-50%);
        }

        #six {
            position: absolute;
            bottom: 1%;
            left: 50%;
            transform: translateX(-50%);
        }

        #nine {
            position: absolute;
            left: 1%;
            top: 50%;
            transform: translateY(-50%);
        }
    </style>

    <script>
        // elements selection
        const secondHand = document.querySelector('.second-hand');
        const minHand = document.querySelector('.min-hand');
        const hourHand = document.querySelector('.hour-hand');

        function setDate() {
            // set date
            const now = new Date();

            // seconds rotation
            const seconds = now.getSeconds();
            const secondsDegree = ((seconds / 60) * 360) + 90;
            secondHand.style.transform = `rotate(${secondsDegree}deg)`;

            // minutes rotation
            const mins = now.getMinutes();
            const minsDegree = ((mins / 60) * 360) + 90;
            minHand.style.transform = `rotate(${minsDegree}deg)`;

            // hours roation
            // const hours=now.getMinutes();
            // const hoursDegree=((mins/12)*360)+90;
            // hourHand.style.transform=`rotate(${hoursDegree}deg)`;
            const hours = now.getHours();
            const hoursDegree = ((hours) / 12 * 360) + 90;
            hourHand.style.transform = `rotate(${hoursDegree}deg)`;
        }

        // calls setdate fn for every 1 sec
        setInterval(setDate, 1000);
    </script>

</body>

</html>
